name: Pull Requests

on:
  pull_request:
    branches:
      - main

jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Use CI Firebase options
        run: cp lib/firebase_options_ci.dart lib/firebase_options.dart

      - name: Flutter analyze
        run: flutter analyze
